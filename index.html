<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MP4 Player Mobile</title>

<style>

/* =========================
   BODY
========================= */

body{

    margin:0;

    background:#bfbfbf;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    overflow:hidden;
}

/* =========================
   APP 9:16
========================= */

.player{

    width:100%;

    max-width:420px;

    height:100vh;

    display:flex;

    flex-direction:column;

    gap:10px;

    padding:10px;

    box-sizing:border-box;
}

/* =========================
   VIDEO 16:9
========================= */

.top-screen{

    position:relative;

    width:100%;

    aspect-ratio:16/9;

    background:black;

    border-radius:12px;

    overflow:hidden;

    flex-shrink:0;
}

/* FALLBACK TELEFONES ANTIGOS */

@supports not (aspect-ratio:16/9){

    .top-screen{

        height:240px;
    }
}

/* =========================
   VIDEO
========================= */

video{

    width:100%;

    height:100%;

    object-fit:contain;

    background:black;
}

/* =========================
   LEGENDA
========================= */

#subtitle{

    position:absolute;

    bottom:80px;

    left:0;

    width:100%;

    text-align:center;

    color:white;

    font-size:18px;

    font-weight:bold;

    text-shadow:2px 2px 5px black;

    padding:10px;

    box-sizing:border-box;

    pointer-events:none;
}

/* =========================
   MENU FULLSCREEN
========================= */

.fullscreen-ui{

    position:absolute;

    bottom:0;

    left:0;

    width:100%;

    background:rgba(0,0,0,0.75);

    padding:10px;

    box-sizing:border-box;

    display:flex;

    flex-direction:column;

    gap:10px;

    transition:0.3s;
}

/* MENU OCULTO */

.fullscreen-ui.hidden{

    opacity:0;

    pointer-events:none;

    transform:translateY(100%);
}

/* =========================
   BARRAS
========================= */

.fs-bars{

    display:flex;

    gap:10px;
}

.fs-bars input{

    width:50%;
}

/* =========================
   BOTÕES
========================= */

.fs-buttons{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

    justify-content:center;
}

button{

    flex:1;

    min-width:60px;

    padding:10px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    background:white;

    font-size:15px;
}

button:hover{

    opacity:0.9;
}

/* =========================
   PAINEL
========================= */

.control-panel{

    background:#d9d9d9;

    padding:12px;

    border-radius:12px;

    box-sizing:border-box;
}

.control-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;
}

/* =========================
   RANGE
========================= */

input[type="range"]{

    width:100%;
}

/* =========================
   PLAYLIST
========================= */

.bottom-screen{

    background:#222;

    padding:10px;

    color:white;

    border-radius:12px;

    overflow:auto;

    flex:1;
}

#videoList div{

    padding:10px;

    background:#333;

    margin:5px 0;

    border-radius:8px;

    cursor:pointer;

    transition:0.2s;
}

#videoList div:hover{

    background:#555;
}

/* =========================
   MOBILE PEQUENO
========================= */

@media(max-width:360px){

    #subtitle{

        font-size:14px;
    }

    button{

        font-size:12px;

        padding:8px;
    }
}

</style>

</head>

<body>

<div class="player">

    <!-- VIDEO -->

    <div
        class="top-screen"
        id="videoContainer"
    >

        <video
            id="videoPlayer"
            playsinline
        ></video>

        <!-- LEGENDA -->

        <div id="subtitle"></div>

        <!-- MENU PLAYER -->

        <div
            class="fullscreen-ui"
            id="fullscreenUI"
        >

            <!-- BARRAS -->

            <div class="fs-bars">

                <input
                    type="range"
                    id="seekBar"
                    min="0"
                    max="100"
                    value="0"
                >

                <input
                    type="range"
                    id="volumeBar"
                    min="0"
                    max="1"
                    step="0.01"
                    value="1"
                >

            </div>

            <!-- BOTÕES -->

            <div class="fs-buttons">

                <button
                    onclick="togglePlay()"
                >
                    ⏯
                </button>

                <button
                    onclick="backward()"
                >
                    ⏪
                </button>

                <button
                    onclick="forward()"
                >
                    ⏩
                </button>

                <button
                    onclick="muteVideo()"
                >
                    🔇
                </button>

                <button
                    onclick="toggleFullscreen()"
                >
                    ⛶
                </button>

                <button
                    id="hideMenuBtn"
                    onclick="toggleMenu()"
                >
                    🙈
                </button>

            </div>

        </div>

    </div>

    <!-- PAINEL -->

    <div class="control-panel">

        <div class="control-grid">

            <button
                onclick="togglePlay()"
            >
                Play/Pause
            </button>

            <button
                onclick="stopVideo()"
            >
                Stop
            </button>

            <button
                onclick="backward()"
            >
                -10s
            </button>

            <button
                onclick="forward()"
            >
                +10s
            </button>

            <button
                onclick="muteVideo()"
            >
                Mute
            </button>

            <button
                onclick="toggleFullscreen()"
            >
                Tela Cheia
            </button>

        </div>

        <br>

        <!-- INPUT VIDEO -->

        <input
            type="file"
            id="videoInput"
            accept="video/mp4"
            multiple
            hidden
        >

        <button
            onclick="videoInput.click()"
        >
            Carregar Vídeos
        </button>

        <!-- INPUT LEGENDA -->

        <input
            type="file"
            id="subtitleInput"
            accept=".srt"
            hidden
        >

        <button
            onclick="subtitleInput.click()"
        >
            Carregar Legenda
        </button>

    </div>

    <!-- PLAYLIST -->

    <div class="bottom-screen">

        <div id="videoList"></div>

    </div>

</div>

<script>

/* =========================
   ELEMENTOS
========================= */

const videoPlayer =
document.getElementById(
    "videoPlayer"
);

const videoInput =
document.getElementById(
    "videoInput"
);

const subtitleInput =
document.getElementById(
    "subtitleInput"
);

const videoList =
document.getElementById(
    "videoList"
);

const seekBar =
document.getElementById(
    "seekBar"
);

const volumeBar =
document.getElementById(
    "volumeBar"
);

const subtitleDiv =
document.getElementById(
    "subtitle"
);

const container =
document.getElementById(
    "videoContainer"
);

const fullscreenUI =
document.getElementById(
    "fullscreenUI"
);

const hideMenuBtn =
document.getElementById(
    "hideMenuBtn"
);

/* =========================
   DADOS
========================= */

let videos = [];

let subtitles = [];

let menuVisible = true;

/* =========================
   CARREGAR VIDEOS
========================= */

videoInput.onchange = (e)=>{

    [...e.target.files].forEach(file=>{

        videos.push({

            name:file.name,

            url:URL.createObjectURL(
                file
            )
        });

    });

    renderVideos();

    if(
        videos.length ===
        e.target.files.length
    ){

        loadVideo(0);
    }
};

function renderVideos(){

    videoList.innerHTML = "";

    videos.forEach(
        (video,index)=>{

        const div =
        document.createElement(
            "div"
        );

        div.innerText =
        video.name;

        div.onclick = ()=>{

            loadVideo(index);
        };

        videoList.appendChild(div);

    });
}

function loadVideo(index){

    videoPlayer.src =
    videos[index].url;

    videoPlayer.play();
}

/* =========================
   CONTROLES
========================= */

function togglePlay(){

    if(videoPlayer.paused){

        videoPlayer.play();

    }else{

        videoPlayer.pause();
    }
}

function stopVideo(){

    videoPlayer.pause();

    videoPlayer.currentTime = 0;
}

function forward(){

    videoPlayer.currentTime =
    Math.min(

        videoPlayer.currentTime + 10,

        videoPlayer.duration || 0
    );
}

function backward(){

    videoPlayer.currentTime =
    Math.max(

        videoPlayer.currentTime - 10,

        0
    );
}

function muteVideo(){

    videoPlayer.muted =
    !videoPlayer.muted;
}

/* =========================
   SEEK BAR
========================= */

videoPlayer.addEventListener(
"timeupdate",
()=>{

    if(videoPlayer.duration){

        seekBar.value =

        (
            videoPlayer.currentTime /

            videoPlayer.duration

        ) * 100;
    }

    updateSubtitle();
});

seekBar.oninput = ()=>{

    videoPlayer.currentTime =

    (
        seekBar.value / 100
    ) * videoPlayer.duration;
};

/* =========================
   VOLUME
========================= */

volumeBar.oninput = ()=>{

    videoPlayer.volume =
    volumeBar.value;
};

/* =========================
   FULLSCREEN
========================= */

function toggleFullscreen(){

    if(
        !document.fullscreenElement
    ){

        container.requestFullscreen();

    }else{

        document.exitFullscreen();
    }
}

/* =========================
   MENU
========================= */

function toggleMenu(){

    menuVisible = !menuVisible;

    if(menuVisible){

        fullscreenUI.classList.remove(
            "hidden"
        );

        hideMenuBtn.innerText =
        "🙈";

    }else{

        fullscreenUI.classList.add(
            "hidden"
        );

        hideMenuBtn.innerText =
        "👁";
    }
}

/* =========================
   AUTO MOSTRAR MENU
========================= */

let hideTimeout;

container.addEventListener(
"mousemove",
showMenuTemporary
);

container.addEventListener(
"touchstart",
showMenuTemporary
);

function showMenuTemporary(){

    if(!menuVisible){

        fullscreenUI.classList.remove(
            "hidden"
        );
    }

    clearTimeout(hideTimeout);

    hideTimeout =
    setTimeout(()=>{

        if(!menuVisible){

            fullscreenUI.classList.add(
                "hidden"
            );
        }

    },3000);
}

/* =========================
   LEGENDA
========================= */

subtitleInput.onchange = (e)=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload =
    (event)=>{

        subtitles =
        parseSRT(
            event.target.result
        );
    };

    reader.readAsText(file);
};

function parseSRT(data){

    const blocks =
    data.split(/\n\s*\n/);

    let result = [];

    blocks.forEach(block=>{

        const lines =
        block.split("\n");

        if(lines.length >= 3){

            const time =
            lines[1];

            const text =
            lines
            .slice(2)
            .join("<br>");

            const times =
            time.split(" --> ");

            result.push({

                start:
                srtTimeToSeconds(
                    times[0]
                ),

                end:
                srtTimeToSeconds(
                    times[1]
                ),

                text:text
            });
        }
    });

    return result;
}

function srtTimeToSeconds(time){

    const parts =

    time
    .replace(",",".")
    .split(":");

    return(

        parseFloat(parts[0]) * 3600 +

        parseFloat(parts[1]) * 60 +

        parseFloat(parts[2])
    );
}

function updateSubtitle(){

    const current =
    videoPlayer.currentTime;

    const subtitle =
    subtitles.find(sub=>

        current >= sub.start &&

        current <= sub.end
    );

    subtitleDiv.innerHTML =

    subtitle
    ? subtitle.text
    : "";
}

/* =========================
   TECLADO
========================= */

document.addEventListener(
"keydown",
(e)=>{

    switch(e.code){

        case "Space":

        e.preventDefault();

        togglePlay();

        break;

        case "ArrowRight":

        forward();

        break;

        case "ArrowLeft":

        backward();

        break;

        case "KeyM":

        muteVideo();

        break;

        case "KeyF":

        toggleFullscreen();

        break;
    }
});

/* =========================
   LIMPAR MEMÓRIA
========================= */

window.addEventListener(
"beforeunload",
()=>{

    videos.forEach(video=>{

        URL.revokeObjectURL(
            video.url
        );
    });
});

</script>

</body>
</html>
